[project]
name = "aidmi-orchestrator"
version = "0.1.0"
description = "AI orchestrator: LLM-driven dbt mapping generation + benchmark harness"
requires-python = ">=3.13"
dependencies = [
    "python-dotenv>=1.0",
    "aidmi-pipeline",
    "pydantic-ai>=0.0.20",
    "google-genai>=1.0",
    "litellm>=1.40",
    "pydantic>=2.7",
    "typer>=0.12",
    "pyyaml>=6.0",
    "python-ulid>=3.0",
    "psycopg2-binary>=2.9",
]

[project.scripts]
aidmi-orchestrator = "aidmi_orchestrator.cli:app"

[project.optional-dependencies]
plots = ["matplotlib>=3.8", "numpy>=2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aidmi_orchestrator"]

[tool.hatch.build.targets.wheel.force-include]
"src/aidmi_orchestrator/fixtures/mock" = "aidmi_orchestrator/fixtures/mock"
"src/aidmi_orchestrator/fixtures/master" = "aidmi_orchestrator/fixtures/master"
"src/aidmi_orchestrator/fixtures/wrong_field_names" = "aidmi_orchestrator/fixtures/wrong_field_names"
"src/aidmi_orchestrator/fixtures/messy_data" = "aidmi_orchestrator/fixtures/messy_data"
"src/aidmi_orchestrator/fixtures/missing_relations" = "aidmi_orchestrator/fixtures/missing_relations"

[tool.uv.sources]
aidmi-pipeline = { workspace = true }

[tool.pytest.ini_options]
markers = [
    "requires_llm: tests that hit a real LLM endpoint; skipped unless API keys are present",
]
