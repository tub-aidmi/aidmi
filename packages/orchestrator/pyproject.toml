[project]
name = "aidmi-orchestrator"
version = "0.1.0"
description = "AI orchestrator: LLM-driven dbt mapping generation + benchmark harness"
requires-python = ">=3.13"
dependencies = [
    "python-dotenv>=1.0",
    "aidmi-pipeline",
    "pydantic-ai>=0.0.20",
    "litellm>=1.40",
    "pydantic>=2.7",
    "typer>=0.12",
    "pyyaml>=6.0",
    "python-ulid>=3.0",
    "psycopg2-binary>=2.9",
    "simple-salesforce>=1.12.4",
]

[project.scripts]
aidmi-orchestrator = "aidmi_orchestrator.cli:app"

[project.optional-dependencies]
plots = ["matplotlib>=3.8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aidmi_orchestrator"]

[tool.hatch.build.targets.wheel.force-include]
"src/aidmi_orchestrator/fixtures/sp1_users/source/contacts.jsonl" = "aidmi_orchestrator/fixtures/sp1_users/source/contacts.jsonl"
"src/aidmi_orchestrator/fixtures/sp1_users/target_schema.json" = "aidmi_orchestrator/fixtures/sp1_users/target_schema.json"
"src/aidmi_orchestrator/fixtures/sp1_users/mock_mapping.json" = "aidmi_orchestrator/fixtures/sp1_users/mock_mapping.json"
"src/aidmi_orchestrator/fixtures/sp1_users/reference_dbt" = "aidmi_orchestrator/fixtures/sp1_users/reference_dbt"
"src/aidmi_orchestrator/fixtures/sf_pipedrive/target_schema.json" = "aidmi_orchestrator/fixtures/sf_pipedrive/target_schema.json"
"src/aidmi_orchestrator/fixtures/sf_pipedrive_snapshot/source" = "aidmi_orchestrator/fixtures/sf_pipedrive_snapshot/source"

[tool.uv.sources]
aidmi-pipeline = { workspace = true }

[tool.pytest.ini_options]
markers = [
    "requires_llm: tests that hit a real LLM endpoint; skipped unless API keys are present",
]
