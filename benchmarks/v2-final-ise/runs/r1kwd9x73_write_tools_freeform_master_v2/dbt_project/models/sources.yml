version: 2

sources:
  - name: fixture_master_v2_src
    schema: 'fixture_master_v2_src'
    tables:
      - name: master_kunden
        columns:
          - name: kundennummer
            tests: [unique, not_null]
          - name: unternehmensname
          - name: erp_nr
          - name: kundenklasse
          - name: vertriebsgebiet
          - name: industrie
          - name: homepage
          - name: stadt
          - name: land_region
      - name: master_kontakte
        columns:
          - name: kontakt_id
            tests: [unique, not_null]
          - name: rufname
          - name: familienname
          - name: kontakt_email
          - name: tel
          - name: berufsbezeichnung
          - name: rolle
          - name: korrespondenzsprache
          - name: kd_nummer
      - name: master_opportunities
        columns:
          - name: opp_kennung
            tests: [unique, not_null]
          - name: titel
          - name: vertriebsphase
          - name: zieldatum
          - name: auftragswert
          - name: waehrungscode
          - name: kunden_ref
      - name: master_projekte
        columns:
          - name: projekt_kennung
            tests: [unique, not_null]
          - name: projektname
          - name: projektstatus
          - name: go_live_datum
          - name: kunden_kennung
          - name: opp_kennung_ref
      - name: master_assets
        columns:
          - name: asset_kennung
            tests: [unique, not_null]
          - name: asset_name
          - name: serien_nummer
          - name: garantieende
          - name: kunden_kennung
          - name: projekt_kennung
