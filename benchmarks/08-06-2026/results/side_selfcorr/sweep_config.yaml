fixture: [sf_pipedrive_snapshot]
runs_per_cell: 3
concurrency: 3
exclusive_model_prefixes: ["ise-"]
models:
  qwen36:
    provider: litellm
    model_name: "ise-ollama/qwen3.6:35b-a3b"
    base_url: http://localhost:4000/v1
    api_key_env: LITELLM_API_KEY
cells:
  - name: structured
    strategy: structured_per_table
    config:
      writer_model: qwen36
      enable_self_correction: [false, true]
  - name: freeform
    strategy: write_tools_freeform
    config:
      writer_model: qwen36
      enable_self_correction: [false, true]
      max_tool_turns: 30
