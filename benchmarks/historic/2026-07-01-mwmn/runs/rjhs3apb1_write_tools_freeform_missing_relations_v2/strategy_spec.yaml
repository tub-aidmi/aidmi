name: write_tools_freeform
strategy: write_tools_freeform
config:
  writer_model:
    provider: litellm
    model_name: nvidia/mistral-medium-3.5-128b
    base_url: http://localhost:4000/v1
    api_key_env: LITELLM_API_KEY
  context_mode: live_query_tool
  max_tool_turns: 40
  enable_self_correction: true
  inline_run_dbt_tool: true
  max_self_correction_passes: 5
