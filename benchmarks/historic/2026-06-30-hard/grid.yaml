fixture:
  - master
  - messy_data
runs_per_cell: 1
concurrency: 1
per_model_exclusive: true
exclusive_model_prefixes: []

models:
  gemini25flash:
    provider: google_cloud
    model_name: gemini-2.5-flash
    api_key_env: GOOGLE_API_KEY
    extra:
      google_thinking_config:
        thinking_budget: 2048
  gemini25pro:
    provider: google_cloud
    model_name: gemini-2.5-pro
    api_key_env: GOOGLE_API_KEY
    extra:
      google_thinking_config:
        thinking_budget: 2048

cells:
  - name: freeform_inline_dbt
    strategy: write_tools_freeform
    config:
      writer_model: gemini25flash
      context_mode: live_query_tool
      samples_per_table: 5
      max_query_tool_rows: 150
      max_tool_turns: 50
      enable_self_correction: true
      inline_run_dbt_tool: true
      max_self_correction_passes: 10

  - name: critique_conservative
    strategy: write_then_critique
    config:
      writer_model: gemini25flash
      critic_model: gemini25pro
      context_mode: live_query_tool
      samples_per_table: 5
      max_query_tool_rows: 150
      max_critique_rounds: 1
      enable_self_correction: true
      max_self_correction_passes: 8
      serial_llm_calls: true

  - name: structured_selfcorrect
    strategy: structured_per_table
    config:
      writer_model: gemini25flash
      context_mode: live_query_tool
      samples_per_table: 5
      max_query_tool_rows: 150
      enable_self_correction: true
      max_self_correction_passes: 10
      serial_llm_calls: true
