fixture: master
runs_per_cell: 1
concurrency: 1
per_model_exclusive: true
exclusive_model_prefixes: []

models:
  gemini25pro:
    provider: google_cloud
    model_name: gemini-2.5-pro
    api_key_env: GOOGLE_API_KEY
  gemini25flash:
    provider: google_cloud
    model_name: gemini-2.5-flash
    api_key_env: GOOGLE_API_KEY
    extra:
      google_thinking_config:
        thinking_budget: 2048

cells:
  - name: freeform
    strategy: write_tools_freeform
    config:
      writer_model: gemini25flash
      context_mode: live_query_tool
      max_query_tool_rows: 100
      max_tool_turns: 40
      enable_self_correction: true
      inline_run_dbt_tool: false
      max_self_correction_passes: 10

  - name: plan_write_critique
    strategy: plan_write_critique
    config:
      planner_model: gemini25pro
      writer_model: gemini25flash
      critic_model: gemini25pro
      max_dbt_correction_initial: 10
      max_critique_rounds: 5
      max_dbt_correction_per_critique: 3
      max_query_tool_rows: 100
      serial_llm_calls: false
