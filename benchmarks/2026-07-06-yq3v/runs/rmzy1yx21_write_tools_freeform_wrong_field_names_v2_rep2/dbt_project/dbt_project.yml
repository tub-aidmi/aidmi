name: 'my_dbt_project'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-database: "postgres"
target-schema: "public" # This will be overridden by dbt's run-time schema

clean-targets:
  - "target"
  - "dbt_packages"

models:
  my_dbt_project:
    +materialized: table
